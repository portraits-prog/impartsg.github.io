<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Volunteer Check-in</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a;
    --accent: #6ee7b7; --accent2: #818cf8; --danger: #f87171;
    --text: #f0f0f5; --muted: #6b7280;
    --success-bg: #052e16; --error-bg: #2d0a0a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 40px; }
  header { width: 100%; max-width: 420px; margin-bottom: 28px; text-align: center; }
  .badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); background: rgba(110,231,183,0.08); border: 1px solid rgba(110,231,183,0.2); border-radius: 20px; padding: 4px 12px; margin-bottom: 12px; }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; color: var(--text); line-height: 1.2; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .day-selector { width: 100%; max-width: 420px; display: flex; gap: 8px; margin-bottom: 20px; }
  .day-btn { flex: 1; padding: 10px 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .day-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(110,231,183,0.08); }
  .scanner-wrap { width: 100%; max-width: 420px; position: relative; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); background: #000; aspect-ratio: 1; margin-bottom: 20px; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scanner-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 60%; aspect-ratio: 1; position: relative; }
  .scan-frame::before, .scan-frame::after, .scan-frame .corner-br, .scan-frame .corner-bl { content: ''; position: absolute; width: 24px; height: 24px; border-color: var(--accent); border-style: solid; }
  .scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .scan-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .scan-frame .corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
  .scan-frame .corner-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .scan-line { position: absolute; left: 4px; right: 4px; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: scan 2s linear infinite; top: 0; }
  @keyframes scan { 0% { top: 4px; opacity: 1; } 90% { top: calc(100% - 4px); opacity: 1; } 100% { top: calc(100% - 4px); opacity: 0; } }
  .scanner-status { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
  #startBtn { width: 100%; max-width: 420px; padding: 16px; border-radius: 14px; border: none; background: var(--accent); color: #052e16; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  #startBtn:active { transform: scale(0.98); opacity: 0.9; }
  #startBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  .result-card { width: 100%; max-width: 420px; border-radius: 16px; padding: 18px 20px; margin-bottom: 12px; display: none; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .result-card.success { background: var(--success-bg); border: 1px solid rgba(110,231,183,0.3); display: block; }
  .result-card.error { background: var(--error-bg); border: 1px solid rgba(248,113,113,0.3); display: block; }
  .result-name { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .result-card.error .result-name { color: var(--danger); }
  .result-detail { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; word-break: break-all; }
  .log-section { width: 100%; max-width: 420px; margin-top: 8px; }
  .log-title { font-size: 11px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; }
  .log-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--surface); border-radius: 10px; margin-bottom: 6px; border: 1px solid var(--border); font-size: 13px; animation: slideUp 0.2s ease; }
  .log-item .log-name { font-weight: 600; }
  .log-item .log-day { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); background: rgba(110,231,183,0.08); padding: 2px 8px; border-radius: 8px; }
  .log-item .log-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  canvas { display: none; }
</style>
</head>
<body>
<header>
  <div class="badge">Live Check-in</div>
  <h1>Volunteer <span>Scanner</span></h1>
  <p class="subtitle">Scan QR code to mark attendance</p>
</header>
<div class="day-selector">
  <button class="day-btn active" data-day="1" onclick="selectDay(1)">Day 1</button>
  <button class="day-btn" data-day="2" onclick="selectDay(2)">Day 2</button>
  <button class="day-btn" data-day="3" onclick="selectDay(3)">Day 3</button>
</div>
<div class="scanner-wrap">
  <video id="video" playsinline autoplay muted></video>
  <div class="scanner-overlay">
    <div class="scan-frame">
      <div class="corner-br"></div>
      <div class="corner-bl"></div>
      <div class="scan-line"></div>
    </div>
  </div>
  <div class="scanner-status" id="scanStatus">Tap Start to activate camera</div>
</div>
<button id="startBtn" onclick="startScanner()">
  <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9V6a3 3 0 013-3h3M3 15v3a3 3 0 003 3h3m6-18h3a3 3 0 013 3v3m0 6v3a3 3 0 01-3 3h-3"/></svg>
  Start Scanner
</button>
<div class="result-card" id="resultCard">
  <div class="result-name" id="resultName"></div>
  <div class="result-detail" id="resultDetail"></div>
</div>
<canvas id="canvas"></canvas>
<div class="log-section">
  <div class="log-title">Session Log</div>
  <div id="logList"></div>
</div>
<script>
  const API_TOKEN  = 'f5608aab-df4d-4b94-a273-3e61590c33c4';
  const DOC_ID     = 'nbQ6R_HmdN';
  const TABLE_NAME = '2026 Q2 Masterlist (June)';
  const DAY_COLUMNS = { 1: 'Day 1', 2: 'Day 2', 3: 'Day 3' };

  let currentDay = 1, scanning = false, lastScanned = null, cooldown = false;
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('scanStatus');
  const resultCard = document.getElementById('resultCard');
  const resultName = document.getElementById('resultName');
  const resultDetail = document.getElementById('resultDetail');
  const startBtn = document.getElementById('startBtn');

  function selectDay(d) {
    currentDay = d;
    document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', +b.dataset.day === d));
  }

  async function startScanner() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
      video.srcObject = stream;
      await video.play();
      scanning = true;
      startBtn.disabled = true;
      startBtn.textContent = 'Scanner Active';
      statusEl.textContent = 'Point at QR code...';
      requestAnimationFrame(tick);
    } catch (e) {
      statusEl.textContent = 'Camera error: ' + e.message;
    }
  }

  function tick() {
    if (!scanning) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
      if (code && !cooldown) {
        const val = code.data.trim();
        if (val !== lastScanned) {
          lastScanned = val;
          cooldown = true;
          statusEl.textContent = 'QR detected — checking in...';
          handleScan(val);
          setTimeout(() => { cooldown = false; lastScanned = null; statusEl.textContent = 'Ready — point at next QR'; }, 4000);
        }
      }
    }
    requestAnimationFrame(tick);
  }

  async function handleScan(rowId) {
    showResult('error', 'Looking up...', 'QR value: ' + rowId);
    console.log('[SCAN] QR value:', rowId);
    try {
      // Step 1: fetch all rows and find matching Check-in Code
      const listUrl = 'https://api.coda.io/v1/docs/' + DOC_ID + '/tables/' + encodeURIComponent(TABLE_NAME) + '/rows?useColumnNames=true&limit=500';
      console.log('[FETCH] URL:', listUrl);
      const res = await fetch(listUrl, { headers: { 'Authorization': 'Bearer ' + API_TOKEN } });
      const data = await res.json();
      console.log('[FETCH] Status:', res.status, 'Items:', data.items ? data.items.length : 'none');

      if (!data.items || data.items.length === 0) {
        showResult('error', 'Table empty or error', JSON.stringify(data).slice(0, 100));
        return;
      }

      // Match by Check-in Code (compare as string)
      const row = data.items.find(r => String(r.values['Check-in Code']) === String(rowId));
      console.log('[MATCH] Found row:', row ? row.id : 'none');

      if (!row) {
        showResult('error', 'Not found', 'No match for code: ' + rowId);
        return;
      }

      const rowCodaId = row.id;
      const volunteerName = row.values['Full Name (as per NRIC)'] || row.values['Full Name'] || row.values['Name'] || 'Volunteer';
      const dayCol = DAY_COLUMNS[currentDay];

      if (row.values[dayCol] === true) {
        showResult('error', volunteerName, 'Already checked in for Day ' + currentDay);
        addLog(volunteerName, 'Already in — Day ' + currentDay);
        return;
      }

      // Step 2: Update the row
      const updateUrl = 'https://api.coda.io/v1/docs/' + DOC_ID + '/tables/' + encodeURIComponent(TABLE_NAME) + '/rows/' + rowCodaId;
      const updateRes = await fetch(updateUrl, {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + API_TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ row: { cells: [{ column: dayCol, value: true }] } })
      });
      console.log('[UPDATE] Status:', updateRes.status);

      if (updateRes.ok) {
        showResult('success', volunteerName, 'Checked in — Day ' + currentDay);
        addLog(volunteerName, 'Day ' + currentDay);
      } else {
        const err = await updateRes.json();
        showResult('error', 'Update failed', err.message || 'Unknown error');
      }
    } catch (e) {
      console.error('[ERROR]', e);
      showResult('error', 'Network error', e.message);
    }
  }

  function showResult(type, name, detail) {
    resultCard.className = 'result-card ' + (type === 'success' ? 'success' : 'error');
    resultName.textContent = name;
    resultDetail.textContent = detail;
  }

  function addLog(name, tag) {
    const now = new Date().toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit' });
    const el = document.createElement('div');
    el.className = 'log-item';
    el.innerHTML = '<div><div class="log-name">' + name + '</div><div class="log-time">' + now + '</div></div><div class="log-day">' + tag + '</div>';
    document.getElementById('logList').prepend(el);
  }
</script>
</body>
</html>
