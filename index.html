<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Volunteer Check-in</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a;
    --accent: #6ee7b7; --danger: #f87171;
    --text: #f0f0f5; --muted: #6b7280;
    --success-bg: #052e16; --error-bg: #2d0a0a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 40px; }
  header { width: 100%; max-width: 420px; margin-bottom: 24px; text-align: center; }
  .badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); background: rgba(110,231,183,0.08); border: 1px solid rgba(110,231,183,0.2); border-radius: 20px; padding: 4px 12px; margin-bottom: 12px; }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .day-selector { width: 100%; max-width: 420px; display: flex; gap: 8px; margin-bottom: 20px; }
  .day-btn { flex: 1; padding: 10px 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
  .day-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(110,231,183,0.08); }

  /* Camera input button */
  .scan-box { width: 100%; max-width: 420px; margin-bottom: 16px; }
  .scan-label {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; padding: 40px 20px; border-radius: 20px;
    border: 2px dashed var(--accent); background: rgba(110,231,183,0.04);
    cursor: pointer; gap: 12px; transition: background 0.2s;
  }
  .scan-label:active { background: rgba(110,231,183,0.1); }
  .scan-icon { font-size: 48px; }
  .scan-label-text { font-size: 16px; font-weight: 700; color: var(--accent); }
  .scan-label-sub { font-size: 12px; color: var(--muted); text-align: center; }
  #cameraInput { display: none; }

  /* Manual entry */
  .divider { width: 100%; max-width: 420px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .manual-row { width: 100%; max-width: 420px; display: flex; gap: 8px; margin-bottom: 16px; }
  .manual-input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; }
  .manual-input::placeholder { color: var(--muted); }
  .manual-btn { padding: 14px 20px; border-radius: 12px; border: none; background: var(--accent); color: #052e16; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }

  .status-bar { width: 100%; max-width: 420px; text-align: center; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-bottom: 12px; min-height: 18px; }
  .result-card { width: 100%; max-width: 420px; border-radius: 16px; padding: 18px 20px; margin-bottom: 12px; display: none; }
  .result-card.success { background: var(--success-bg); border: 1px solid rgba(110,231,183,0.3); display: block; }
  .result-card.error   { background: var(--error-bg);   border: 1px solid rgba(248,113,113,0.3); display: block; }
  .result-name   { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .result-card.error .result-name { color: var(--danger); }
  .result-detail { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; word-break: break-all; }
  .log-section { width: 100%; max-width: 420px; margin-top: 8px; }
  .log-label { font-size: 11px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; }
  .log-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--surface); border-radius: 10px; margin-bottom: 6px; border: 1px solid var(--border); font-size: 13px; }
  .log-name { font-weight: 600; }
  .log-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .log-day-tag { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); background: rgba(110,231,183,0.08); padding: 2px 8px; border-radius: 8px; }
  canvas { display: none; }
</style>
</head>
<body>

<header>
  <div class="badge">Live Check-in</div>
  <h1>Volunteer <span>Scanner</span></h1>
  <p class="subtitle">Tap the button to scan a QR code</p>
</header>

<div class="day-selector">
  <button class="day-btn active" data-day="1" onclick="selectDay(1)">Day 1</button>
  <button class="day-btn" data-day="2" onclick="selectDay(2)">Day 2</button>
  <button class="day-btn" data-day="3" onclick="selectDay(3)">Day 3</button>
</div>

<!-- Native camera input — most reliable on mobile -->
<div class="scan-box">
  <label class="scan-label" for="cameraInput">
    <div class="scan-icon">📷</div>
    <div class="scan-label-text">Tap to Scan QR Code</div>
    <div class="scan-label-sub">Opens your phone camera directly</div>
  </label>
  <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handlePhoto(this)">
</div>

<div class="status-bar" id="statusBar">Select a day then tap to scan</div>

<!-- Manual fallback -->
<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-text">or enter code manually</div>
  <div class="divider-line"></div>
</div>
<div class="manual-row">
  <input class="manual-input" id="manualInput" type="number" placeholder="e.g. 99" />
  <button class="manual-btn" onclick="manualCheckin()">Check In</button>
</div>

<div class="result-card" id="resultCard">
  <div class="result-name" id="resultName"></div>
  <div class="result-detail" id="resultDetail"></div>
</div>

<canvas id="qrCanvas"></canvas>

<div class="log-section">
  <div class="log-label">Session Log</div>
  <div id="logList"></div>
</div>

<script>
  var API_TOKEN  = 'f5608aab-df4d-4b94-a273-3e61590c33c4';
  var DOC_ID     = 'nbQ6R_HmdN';
  var TABLE_NAME = '2026 Q2 Masterlist (June)';
  var DAY_COLS   = { 1: 'Day 1', 2: 'Day 2', 3: 'Day 3' };
  var currentDay = 1;

  // Load jsQR
  var jsQRReady = false;
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
  s.onload = function() { jsQRReady = true; setStatus('Ready — select day and tap to scan'); };
  s.onerror = function() { setStatus('QR library failed to load — use manual entry below'); };
  document.head.appendChild(s);

  function setStatus(msg) { document.getElementById('statusBar').textContent = msg; }

  function selectDay(d) {
    currentDay = d;
    document.querySelectorAll('.day-btn').forEach(function(b) {
      b.classList.toggle('active', +b.dataset.day === d);
    });
  }

  function handlePhoto(input) {
    if (!input.files || !input.files[0]) return;
    if (!jsQRReady) { setStatus('QR library still loading, try again...'); return; }
    setStatus('Reading image...');
    var file = input.files[0];
    var img  = new Image();
    var url  = URL.createObjectURL(file);
    img.onload = function() {
      var canvas = document.getElementById('qrCanvas');
      // Use full resolution
      canvas.width  = img.width;
      canvas.height = img.height;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
      URL.revokeObjectURL(url);
      // Reset input so same photo can be retaken
      input.value = '';
      if (code && code.data) {
        var val = code.data.trim();
        setStatus('QR detected: ' + val + ' — looking up...');
        handleScan(val);
      } else {
        setStatus('Could not read QR — try again, make sure QR fills the frame');
      }
    };
    img.onerror = function() { setStatus('Could not load image'); };
    img.src = url;
  }

  function manualCheckin() {
    var val = document.getElementById('manualInput').value.trim();
    if (!val) { setStatus('Please enter a code'); return; }
    setStatus('Looking up code: ' + val);
    handleScan(val);
    document.getElementById('manualInput').value = '';
  }

  async function handleScan(rowId) {
    showResult('error', 'Looking up...', 'Code: ' + rowId);
    try {
      var url = 'https://api.coda.io/v1/docs/' + DOC_ID +
                '/tables/' + encodeURIComponent(TABLE_NAME) +
                '/rows?useColumnNames=true&limit=500';
      var res  = await fetch(url, { headers: { 'Authorization': 'Bearer ' + API_TOKEN } });
      if (!res.ok) { showResult('error', 'API Error', 'HTTP ' + res.status); return; }
      var data = await res.json();
      if (!data.items || data.items.length === 0) { showResult('error', 'Empty table', 'No rows returned'); return; }

      var row = data.items.find(function(r) {
        return String(r.values['Check-in Code']).trim() === String(rowId).trim();
      });

      if (!row) {
        var sample = data.items.slice(0,3).map(function(r){ return r.values['Check-in Code']; }).join(', ');
        showResult('error', 'No match for: ' + rowId, 'Sample codes in table: ' + sample);
        return;
      }

      var name   = row.values['Full Name (as per NRIC)'] || row.values['Full Name'] || 'Volunteer';
      var dayCol = DAY_COLS[currentDay];

      if (row.values[dayCol] === true) {
        showResult('error', name, 'Already checked in for Day ' + currentDay);
        addLog(name, 'Already in');
        return;
      }

      var upRes = await fetch(
        'https://api.coda.io/v1/docs/' + DOC_ID + '/tables/' + encodeURIComponent(TABLE_NAME) + '/rows/' + row.id,
        {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer ' + API_TOKEN, 'Content-Type': 'application/json' },
          body: JSON.stringify({ row: { cells: [{ column: dayCol, value: true }] } })
        }
      );

      if (upRes.ok) {
        showResult('success', name, 'Checked in — Day ' + currentDay);
        addLog(name, 'Day ' + currentDay);
        setStatus('Done! Tap to scan next volunteer');
      } else {
        var err = await upRes.json();
        showResult('error', 'Update failed', err.message || 'Unknown error');
      }
    } catch(e) {
      showResult('error', 'Network error', e.message);
    }
  }

  function showResult(type, name, detail) {
    var card = document.getElementById('resultCard');
    card.className = 'result-card ' + type;
    document.getElementById('resultName').textContent   = name;
    document.getElementById('resultDetail').textContent = detail;
  }

  function addLog(name, tag) {
    var now = new Date().toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit' });
    var el  = document.createElement('div');
    el.className = 'log-item';
    el.innerHTML = '<div><div class="log-name">' + name + '</div><div class="log-time">' + now + '</div></div><div class="log-day-tag">' + tag + '</div>';
    document.getElementById('logList').prepend(el);
  }
</script>
</body>
</html>
