<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Volunteer Check-in</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a;
    --accent: #6ee7b7; --danger: #f87171;
    --text: #f0f0f5; --muted: #6b7280;
    --success-bg: #052e16; --error-bg: #2d0a0a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 40px; }
  header { width: 100%; max-width: 420px; margin-bottom: 24px; text-align: center; }
  .badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); background: rgba(110,231,183,0.08); border: 1px solid rgba(110,231,183,0.2); border-radius: 20px; padding: 4px 12px; margin-bottom: 12px; }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .day-selector { width: 100%; max-width: 420px; display: flex; gap: 8px; margin-bottom: 20px; }
  .day-btn { flex: 1; padding: 10px 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
  .day-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(110,231,183,0.08); }
  .scanner-wrap { width: 100%; max-width: 420px; position: relative; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); background: #000; aspect-ratio: 1; margin-bottom: 12px; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-corners { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .frame { width: 65%; aspect-ratio: 1; position: relative; }
  .frame::before, .frame::after, .frame .br, .frame .bl { content: ''; position: absolute; width: 26px; height: 26px; border-color: var(--accent); border-style: solid; }
  .frame::before { top:0; left:0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .frame::after  { top:0; right:0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .frame .br { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
  .frame .bl { bottom:0; left:0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .scan-line { position: absolute; left: 17.5%; right: 17.5%; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: scanline 2s linear infinite; }
  @keyframes scanline { 0% { top: 17.5%; opacity:1; } 90% { top: 82.5%; opacity:1; } 100% { top: 82.5%; opacity:0; } }
  .status-bar { width: 100%; max-width: 420px; text-align: center; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-bottom: 12px; min-height: 20px; padding: 0 8px; }
  .btn-row { width: 100%; max-width: 420px; display: flex; gap: 10px; margin-bottom: 16px; }
  .btn { flex: 1; padding: 16px; border-radius: 14px; border: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-start { background: var(--accent); color: #052e16; }
  .btn-capture { background: #818cf8; color: #fff; display: none; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .result-card { width: 100%; max-width: 420px; border-radius: 16px; padding: 18px 20px; margin-bottom: 12px; display: none; }
  .result-card.success { background: var(--success-bg); border: 1px solid rgba(110,231,183,0.3); display: block; }
  .result-card.error   { background: var(--error-bg);   border: 1px solid rgba(248,113,113,0.3); display: block; }
  .result-name   { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .result-card.error .result-name { color: var(--danger); }
  .result-detail { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; word-break: break-all; }
  .log-section { width: 100%; max-width: 420px; margin-top: 8px; }
  .log-label { font-size: 11px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; }
  .log-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--surface); border-radius: 10px; margin-bottom: 6px; border: 1px solid var(--border); font-size: 13px; }
  .log-name { font-weight: 600; }
  .log-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .log-day-tag { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); background: rgba(110,231,183,0.08); padding: 2px 8px; border-radius: 8px; }
  canvas { display: none; }
</style>
</head>
<body>

<header>
  <div class="badge">Live Check-in</div>
  <h1>Volunteer <span>Scanner</span></h1>
  <p class="subtitle">Scan QR code to mark attendance</p>
</header>

<div class="day-selector">
  <button class="day-btn active" data-day="1" onclick="selectDay(1)">Day 1</button>
  <button class="day-btn" data-day="2" onclick="selectDay(2)">Day 2</button>
  <button class="day-btn" data-day="3" onclick="selectDay(3)">Day 3</button>
</div>

<div class="scanner-wrap">
  <video id="video" playsinline autoplay muted></video>
  <div class="scan-corners"><div class="frame"><div class="br"></div><div class="bl"></div></div></div>
  <div class="scan-line"></div>
</div>

<div class="status-bar" id="statusBar">Loading scanner...</div>

<div class="btn-row">
  <button class="btn btn-start" id="startBtn" onclick="startScanner()" disabled>Loading...</button>
  <button class="btn btn-capture" id="captureBtn" onclick="captureAndScan()">📷 Capture</button>
</div>

<div class="result-card" id="resultCard">
  <div class="result-name" id="resultName"></div>
  <div class="result-detail" id="resultDetail"></div>
</div>

<canvas id="qrCanvas"></canvas>

<div class="log-section">
  <div class="log-label">Session Log</div>
  <div id="logList"></div>
</div>


<script>
  var API_TOKEN  = 'f5608aab-df4d-4b94-a273-3e61590c33c4';
  var DOC_ID     = 'nbQ6R_HmdN';
  var TABLE_NAME = '2026 Q2 Masterlist (June)';
  var DAY_COLS   = { 1: 'Day 1', 2: 'Day 2', 3: 'Day 3' };

  var currentDay = 1;
  var scanning   = false;
  var cooldown   = false;
  var video      = document.getElementById('video');
  var qrCanvas   = document.getElementById('qrCanvas');
  var qrCtx      = qrCanvas.getContext('2d');
  var startBtn   = document.getElementById('startBtn');
  var captureBtn = document.getElementById('captureBtn');

  function onJsQRLoaded() {
    setStatus('Ready — tap Start Scanner');
    startBtn.disabled = false;
    startBtn.textContent = 'Start Scanner';
  }

  function onJsQRError() {
    setStatus('ERROR: Failed to load QR library. Check internet connection.');
  }

  function setStatus(msg) { document.getElementById('statusBar').textContent = msg; }

  function selectDay(d) {
    currentDay = d;
    document.querySelectorAll('.day-btn').forEach(function(b) {
      b.classList.toggle('active', +b.dataset.day === d);
    });
  }

  function startScanner() {
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    }).then(function(stream) {
      video.srcObject = stream;
      video.play();
      scanning = true;
      startBtn.disabled = true;
      startBtn.textContent = 'Scanning...';
      captureBtn.style.display = 'block';
      setStatus('Point QR at camera — or tap Capture');
      // auto scan loop
      requestAnimationFrame(autoTick);
    }).catch(function(e) {
      setStatus('Camera error: ' + e.name);
    });
  }

  // Auto scan every 500ms
  var lastAutoScan = 0;
  function autoTick(ts) {
    if (!scanning) return;
    if (ts - lastAutoScan > 500) {
      lastAutoScan = ts;
      tryScan();
    }
    requestAnimationFrame(autoTick);
  }

  // Manual capture button
  function captureAndScan() {
    if (!scanning) return;
    captureBtn.disabled = true;
    captureBtn.textContent = 'Scanning...';
    var result = tryScan();
    setTimeout(function() {
      captureBtn.disabled = false;
      captureBtn.textContent = '📷 Capture';
    }, 1000);
    if (!result) setStatus('No QR found in frame — try again');
  }

  function tryScan() {
    if (!video.videoWidth || cooldown) return false;
    qrCanvas.width  = video.videoWidth;
    qrCanvas.height = video.videoHeight;
    qrCtx.drawImage(video, 0, 0);

    // Try normal
    var img  = qrCtx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
    var code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'attemptBoth' });

    if (code && code.data.trim()) {
      var val = code.data.trim();
      cooldown = true;
      setStatus('QR detected: ' + val);
      handleScan(val);
      setTimeout(function() { cooldown = false; setStatus('Ready — point at next QR'); }, 5000);
      return true;
    }
    return false;
  }

  async function handleScan(rowId) {
    showResult('error', 'Looking up...', 'QR: ' + rowId);
    try {
      var url = 'https://api.coda.io/v1/docs/' + DOC_ID +
                '/tables/' + encodeURIComponent(TABLE_NAME) +
                '/rows?useColumnNames=true&limit=500';
      var res  = await fetch(url, { headers: { 'Authorization': 'Bearer ' + API_TOKEN } });

      if (!res.ok) {
        showResult('error', 'API Error', 'HTTP ' + res.status + ' — check token/doc ID');
        return;
      }

      var data = await res.json();
      if (!data.items || data.items.length === 0) {
        showResult('error', 'Empty table', 'No rows returned from Coda');
        return;
      }

      var row = data.items.find(function(r) {
        return String(r.values['Check-in Code']).trim() === String(rowId).trim();
      });

      if (!row) {
        // Show available codes to help debug
        var sample = data.items.slice(0,3).map(function(r){ return r.values['Check-in Code']; }).join(', ');
        showResult('error', 'No match for: ' + rowId, 'Sample codes in table: ' + sample);
        return;
      }

      var name   = row.values['Full Name (as per NRIC)'] || row.values['Full Name'] || 'Volunteer';
      var dayCol = DAY_COLS[currentDay];

      if (row.values[dayCol] === true) {
        showResult('error', name, 'Already checked in for Day ' + currentDay);
        addLog(name, 'Already in');
        return;
      }

      var upRes = await fetch(
        'https://api.coda.io/v1/docs/' + DOC_ID + '/tables/' + encodeURIComponent(TABLE_NAME) + '/rows/' + row.id,
        {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer ' + API_TOKEN, 'Content-Type': 'application/json' },
          body: JSON.stringify({ row: { cells: [{ column: dayCol, value: true }] } })
        }
      );

      if (upRes.ok) {
        showResult('success', name, 'Checked in — Day ' + currentDay);
        addLog(name, 'Day ' + currentDay);
      } else {
        var err = await upRes.json();
        showResult('error', 'Update failed', err.message || 'Unknown error');
      }
    } catch(e) {
      showResult('error', 'Network error', e.message);
    }
  }

  function showResult(type, name, detail) {
    var card = document.getElementById('resultCard');
    card.className = 'result-card ' + type;
    document.getElementById('resultName').textContent   = name;
    document.getElementById('resultDetail').textContent = detail;
  }

  function addLog(name, tag) {
    var now = new Date().toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit' });
    var el  = document.createElement('div');
    el.className = 'log-item';
    el.innerHTML = '<div><div class="log-name">' + name + '</div><div class="log-time">' + now + '</div></div><div class="log-day-tag">' + tag + '</div>';
    document.getElementById('logList').prepend(el);
  }
</script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js";
  s.onload = onJsQRLoaded;
  s.onerror = onJsQRError;
  document.head.appendChild(s);
});
</script>
</body>
</html>
